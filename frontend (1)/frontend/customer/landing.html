<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cafe Aroma | Share Your Experience</title>
<link rel="stylesheet" href="../shared/shared.css">
  <link rel="stylesheet" href="customer.css">
</head>
<body class="landing-body">

  <main class="landing-wrapper">
    <div class="landing-card">

      <div class="brand-block">
        <div class="logo-ring">
          <div class="logo-placeholder" id="bizLogo">CA</div>
        </div>

        <h2 class="business-name" id="bizName">Cafe Aroma</h2>

        <div class="rating-badge"><span class="rating-star">★</span><span id="bizRating">4.8</span> Google Rating</div>
      </div>

      <h1 class="welcome-heading">We'd Love Your Feedback</h1>

      <p class="landing-desc">
        We value your feedback. It only takes a minute to share your experience.
      </p>

      <div class="feature-list">
        <div class="feature-item">
          <span class="feature-icon">⚡</span>
          <span class="feature-text">Takes less than 60 seconds</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">🔒</span>
          <span class="feature-text">Secure &amp; private</span>
        </div>
        <div class="feature-item">
          <span class="feature-icon">✨</span>
          <span class="feature-text">AI-powered review assistant</span>
        </div>
      </div>

      <button id="leaveReviewBtn" class="cta-btn">Leave a Review</button>

      <p class="powered-by">Powered by <span>Graphura's ReviewFlow</span></p>

    </div>
  </main>

<script src="../shared/business-config.js"></script>
<script src="../shared/utils.js"></script>
<script src="js/landing.js"></script>
</body>
</html>
