<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphura ReviewFlow | Administrator Portal</title>
<link rel="stylesheet" href="../shared/shared.css?v=20260705">
<link rel="stylesheet" href="admin.css?v=20260705">
</head>
<body class="landing-body">

  <main class="landing-wrapper">
    <div class="landing-card admin-login-card">

      <div class="brand-block">
        <div class="logo-ring">
          <img src="../admin/graphura-logo.png" alt="Graphura logo" class="admin-logo-img">
        </div>

        <h2 class="business-name">Graphura's ReviewFlow</h2>

        <div class="rating-badge admin-portal-badge">Administrator Portal</div>
      </div>

      <h1 class="welcome-heading">Secure Access</h1>

      <p class="landing-desc">
        Secure access to manage businesses, business owners, platform analytics and overall system operations.
      </p>

      <form id="adminLoginForm" class="questionnaire-form admin-login-form" novalidate>

        <div class="form-field">
          <label class="form-label" for="adminEmail">Email Address</label>
          <input type="email" id="adminEmail" class="form-input" placeholder="admin@graphura.ai" autocomplete="username">
          <p class="field-error" id="emailError"></p>
        </div>

        <div class="form-field">
          <label class="form-label" for="adminPassword">Password</label>
          <div class="password-field-wrap">
            <input type="password" id="adminPassword" class="form-input" placeholder="Enter your password" autocomplete="current-password">
            <button type="button" class="password-toggle-btn" id="togglePasswordBtn" aria-label="Show password">👁️</button>
          </div>
          <p class="field-error" id="passwordError"></p>
        </div>

        <div class="form-row">
          <label class="checkbox-row">
            <input type="checkbox" id="rememberMe">
            <span class="checkbox-box"></span>
            <span class="checkbox-label">Remember me</span>
          </label>

          <a href="#" class="form-link">Forgot password?</a>
        </div>

        <button type="submit" class="cta-btn" id="loginSubmitBtn">Sign In</button>

      </form>

      <p class="powered-by">© <span>Graphura's' ReviewFlow</span></p>

    </div>
  </main>

  <div id="toast" class="toast"></div>

<script src="../shared/utils.js?v=20260705"></script>
<script src="../shared/constants.js?v=20260705"></script>
<script src="js/login.js?v=20260705"></script>
</body>
</html>
